<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Russet Systems</title>

  <style>
    /* Remove all default spacing */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    /* Make the whole screen clickable */
    a.fullscreen-link {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* Make image fill entire screen */
    img.fullscreen-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
      display: block;
    }
  </style>
</head>

<body>
  <a href="page2.html" class="fullscreen-link">
    <img src="home.jpg" alt="Homepage" class="fullscreen-image">
  </a>
</body>
</html>
